[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# 1. Route all frontend API calls directly to your Render backend
[[redirects]]
  from = "/api/*"
  to = "https://nimbus-nn3f.onrender.com"
  status = 200
  force = true

# 2. Frontend React Router catch-all fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
